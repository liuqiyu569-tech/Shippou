server:
  port: 8080

spring:
  application:
    name: short-url-service

  # Week 7: DataSource 由 ShardingSphereDataSourceConfig 提供（基于 sharding-config.yaml + Spring 注入密码）
  # 不再使用 spring.datasource 自动配置

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # password 行故意省略：Redisson 对空字符串密码不容忍（Week 4 踩过）
      # 需要密码时通过 SPRING_DATA_REDIS_PASSWORD 环境变量注入（Spring Boot 自动绑定）
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin123}
    publisher-confirm-type: correlated   # 开启 publisher confirm
    publisher-returns: true              # 开启 mandatory return（路由失败时回调）
    listener:
      simple:
        acknowledge-mode: manual         # 手动 ACK，业务成功才确认
        prefetch: 50                     # 每个 consumer 一次最多拉 50 条
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.fudan.shorturl.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id          # 雪花算法
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 短链业务配置
shorturl:
  domain: ${SHORTURL_DOMAIN:http://localhost:8080}    # 短链对外域名（部署后改成正式域名）

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.fudan.shorturl: debug
    com.fudan.shorturl.mapper: debug
