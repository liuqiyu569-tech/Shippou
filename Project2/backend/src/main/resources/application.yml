server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: task-management
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jackson:
    time-zone: Asia/Shanghai

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-please-change-this-secret-at-least-64-chars-long-2026}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
